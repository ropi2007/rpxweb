<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M. Rofi Ardiansyah | Civil Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #e2e8f0; }
        .glass { background: rgba(10, 20, 10, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(16, 185, 129, 0.2); }
        .text-glow { text-shadow: 0 0 10px rgba(16, 185, 129, 0.5); }
        .photo-card { transition: all 0.4s ease; cursor: pointer; }
        .photo-card:hover { transform: scale(1.02); border-color: #10b981; }
        
        /* Modal Style */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { max-width: 500px; width: 100%; }
    </style>
</head>
<body>

    <section class="min-h-screen flex flex-col items-center justify-center relative px-6 text-center">
        <div data-aos="zoom-in">
            <img src="118224.jpg" class="w-48 h-48 rounded-full object-cover border-4 border-emerald-500 shadow-[0_0_30px_rgba(16,185,129,0.3)] mb-8">
        </div>
        <h1 data-aos="fade-up" class="text-4xl md:text-6xl font-extrabold tracking-tighter">
            M. ROFI <span class="text-emerald-500 text-glow">ARDIANSYAH</span>
        </h1>
        <p class="text-emerald-400/70 mt-4 tracking-[0.2em] uppercase text-xs font-bold">Civil Engineering Student</p>
    </section>

    <section class="py-20 px-6 max-w-6xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div data-aos="fade-up" class="photo-card glass rounded-[2rem] p-4" onclick="showDetail('professional')">
                <img src="1797.jpg" class="w-full h-72 object-cover rounded-2xl mb-4">
                <h4 class="font-bold text-emerald-500">Clean & Professional</h4>
                <p class="text-xs text-gray-500 mt-2">Klik untuk detail</p>
            </div>

            <div data-aos="fade-up" data-aos-delay="200" class="photo-card glass rounded-[2rem] p-4" onclick="showDetail('balance')">
                <img src="1729.jpg" class="w-full h-72 object-cover rounded-2xl mb-4">
                <h4 class="font-bold text-emerald-500">Balance of Life</h4>
                <p class="text-xs text-gray-500 mt-2">Klik untuk detail</p>
            </div>

            <div data-aos="fade-up" data-aos-delay="400" class="photo-card glass rounded-[2rem] p-4" onclick="showDetail('spirit')">
                <img src="1794.jpg" class="w-full h-72 object-cover rounded-2xl mb-4">
                <h4 class="font-bold text-emerald-500">Undaunted Spirit</h4>
                <p class="text-xs text-gray-500 mt-2">Klik untuk detail</p>
            </div>

        </div>
    </section>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content glass p-8 rounded-[2.5rem] border-emerald-500 shadow-2xl" onclick="event.stopPropagation()">
            <h3 id="modal-title" class="text-2xl font-bold text-emerald-500 mb-4 tracking-tight"></h3>
            <p id="modal-text" class="text-gray-300 leading-relaxed text-sm"></p>
            <button class="mt-8 text-xs font-bold text-emerald-500 tracking-widest uppercase border border-emerald-500/30 px-6 py-2 rounded-full hover:bg-emerald-500 hover:text-black transition" onclick="closeModal()">Tutup</button>
        </div>
    </div>

    <div class="fixed bottom-8 right-8 z-50">
        <a href="https://wa.me/62xxxxxxxxxxx" class="bg-emerald-600 p-4 rounded-full shadow-lg block hover:scale-110 transition">
            <svg class="w-6 h-6 text-black" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.556 5.332-11.888 11.888-11.888 3.176 0 6.165 1.237 8.413 3.484 2.248 2.248 3.484 5.236 3.484 8.413 0 6.556-5.332 11.888-11.888 11.888-2.004 0-3.972-.511-5.713-1.482l-6.289 1.694zm6.75-3.357l.356.211c1.291.766 2.775 1.171 4.296 1.171 4.843 0 8.783-3.94 8.783-8.783 0-2.346-.913-4.553-2.571-6.211-1.658-1.658-3.865-2.571-6.211-2.571-4.843 0-8.783 3.94-8.783 8.783 0 1.666.467 3.29 1.35 4.71l.233.375-1.03 3.75 3.844-1.036z"/></svg>
        </a>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        const content = {
            professional: {
                title: "Clean & Professional",
                text: "Mempresentasikan dedikasi saya dalam dunia teknik. Dengan latar belakang pendidikan teknis, saya mengutamakan presisi, kerapihan, dan profesionalisme dalam setiap tugas. Foto ini mencerminkan kesiapan saya untuk berkontribusi di industri konstruksi dan pembangunan masa depan."
            },
            balance: {
                title: "Balance of Life",
                text: "Dunia teknik sipil penuh dengan perhitungan dan logika, namun eksplorasi alam adalah cara saya menjaga keseimbangan. Perjalanan ke pegunungan dan ruang terbuka melatih ketenangan serta memberikan perspektif baru yang membantu saya tetap kreatif dalam memecahkan masalah teknis."
            },
            spirit: {
                title: "Undaunted Spirit",
                text: "Ketangguhan adalah kunci. Foto ini menggambarkan sisi manusiawi di balik kerja keras; sebuah momen istirahat untuk mengumpulkan kekuatan kembali. Tidak peduli seberapa berat tantangan di lapangan, semangat untuk bertahan dan bangkit kembali adalah fondasi dari karakter saya."
            }
        };

        function showDetail(key) {
            document.getElementById('modal-title').innerText = content[key].title;
            document.getElementById('modal-text').innerText = content[key].text;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
