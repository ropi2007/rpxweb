<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M. Rofi Ardiansyah | Personal Branding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000000;
            background-image: 
                linear-gradient(rgba(0, 255, 102, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 102, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #e2e8f0;
            overflow-x: hidden;
            position: relative;
        }

        .gloss-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 50% -20%, rgba(0, 255, 102, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .glass {
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 102, 0.25);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
        }

        .text-glow { text-shadow: 0 0 15px rgba(0, 255, 102, 0.8); }
        .neon-border {
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
            transition: all 0.3s ease;
        }
        .neon-border:hover {
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.9);
            border-color: #00ff66;
        }

        .photo-card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            background: #000;
        }
        .photo-card:hover {
            transform: translateY(-10px) rotate(1deg);
            border-color: #00ff66;
            box-shadow: 0 10px 30px rgba(0, 255, 102, 0.2);
        }

        .music-playing { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 102, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(0, 255, 102, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 102, 0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        .shake-animation { animation: shake 0.3s ease-in-out; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.8); }
        ::-webkit-scrollbar-thumb { background: #00ff66; border-radius: 10px; }
    </style>
</head>
<body id="mainBody" style="overflow: hidden;">

    <script>
        if (localStorage.getItem('isAuthorized') === 'true') {
            document.body.style.overflow = 'auto';
        }
    </script>

    <div id="passwordOverlay" class="fixed inset-0 z-[9999] flex items-center justify-center bg-black/95 backdrop-blur-md transition-opacity duration-700">
        <script>
            if (localStorage.getItem('isAuthorized') === 'true') {
                document.getElementById('passwordOverlay').style.display = 'none';
            }
        </script>
        <div class="glass p-8 rounded-[2rem] w-[90%] max-w-md border-green-500/50 relative overflow-hidden flex flex-col items-center text-center shadow-[0_0_50px_rgba(0,255,102,0.1)]">
            <div id="authSection" class="w-full transition-all duration-500">
                <h2 class="text-xl font-bold text-green-400 mb-6 text-glow">mau masuk?? tau passwordnya ngga?</h2>
                <input type="password" id="passInput" class="w-full bg-black/50 border border-green-900 focus:border-green-500 rounded-xl px-4 py-3 text-center text-green-400 outline-none mb-2 placeholder-green-900/50" placeholder="Ketik password...">
                <p id="errorText" class="text-red-500 text-sm h-5 opacity-0 transition-opacity mb-4 font-bold">hayoooo lau siape</p>
                <button onclick="checkPassword()" class="w-full bg-green-600 text-black font-extrabold py-3 rounded-xl hover:bg-green-500 transition-all neon-border uppercase tracking-widest text-sm">Verifikasi</button>
            </div>
            <div id="successSection" class="w-full hidden flex-col items-center transition-all duration-500">
                <div class="w-16 h-16 bg-green-500/20 rounded-full flex items-center justify-center mb-4 text-3xl neon-border border-green-500 text-glow">🔓</div>
                <p class="text-green-400 font-bold text-xl mb-8 text-glow">"keknya kenal banget nih sama doi"</p>
                <button onclick="enterWebsite()" class="w-full bg-green-600 text-black font-extrabold py-3 rounded-xl hover:bg-green-500 transition-all neon-border uppercase tracking-widest text-sm">Silakan...</button>
            </div>
        </div>
    </div>

    <div class="gloss-overlay"></div>

    <div class="fixed top-8 right-8 z-[100]">
        <button id="musicBtn" class="glass p-4 rounded-full border-green-500/50 text-green-400 hover:bg-green-500 hover:text-black transition-all">
            <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" /></svg>
        </button>
        <audio id="myAudio" loop><source src="gaspol.mp3" type="audio/mpeg"></audio>
    </div>

    <div class="fixed bottom-8 left-8 z-50">
        <button id="aiToggleBtn" class="glass bg-black p-4 rounded-full shadow-lg block hover:scale-110 transition-all neon-border border-green-500 text-green-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
        </button>
    </div>

    <div id="aiChatBox" class="fixed bottom-24 left-8 w-80 sm:w-96 glass bg-black/90 rounded-2xl flex-col z-50 overflow-hidden transform transition-all duration-300 opacity-0 scale-95 pointer-events-none border-green-500/50 flex">
        <div class="bg-gradient-to-r from-green-900/50 to-black p-4 border-b border-green-500/30 flex justify-between items-center">
            <h3 class="text-green-400 font-bold flex items-center gap-2 text-sm tracking-wider text-glow">GEMINI AI</h3>
            <button id="closeAiBtn" class="text-green-500 hover:text-white transition">&times;</button>
        </div>
        <div id="chatMessages" class="p-4 h-64 overflow-y-auto flex flex-col gap-3 text-sm scroll-smooth">
            <div class="bg-green-900/30 border border-green-500/30 p-3 rounded-lg rounded-tl-none text-green-100 self-start max-w-[85%]">
                Halo! Aku Gemini AI. Tanya apa saja soal Rofi atau hal lainnya!
            </div>
        </div>
        <div class="p-3 bg-black/80 border-t border-green-500/30 flex gap-2">
            <input type="text" id="aiInput" class="w-full bg-black rounded-lg px-3 py-2 text-green-400 outline-none border border-green-900 focus:border-green-500 text-sm placeholder-green-800" placeholder="Ketik pesan...">
            <button id="sendAiBtn" class="bg-green-600 text-black p-2 px-4 rounded-lg hover:bg-green-500 transition font-bold">Go</button>
        </div>
    </div>

    <section class="min-h-screen flex flex-col items-center justify-center relative px-6 z-10">
        <div data-aos="zoom-in" class="relative group mt-10">
            <div class="absolute -inset-1 bg-gradient-to-r from-green-400 to-emerald-600 rounded-full blur opacity-30 group-hover:opacity-100 transition duration-1000"></div>
            <img src="118224.jpg" alt="M. Rofi Ardiansyah" class="relative w-48 h-48 md:w-56 md:h-56 rounded-full object-cover border-4 border-green-500 shadow-2xl filter grayscale contrast-125 group-hover:grayscale-0 transition-all duration-700">
        </div>
        <div class="text-center mt-8 z-10">
            <h1 data-aos="fade-up" class="text-4xl md:text-6xl font-extrabold tracking-tighter text-white">M. ROFI <span class="text-green-500 text-glow">ARDIANSYAH</span></h1>
            <p data-aos="fade-up" data-aos-delay="200" class="text-green-400 mt-2 font-medium tracking-widest uppercase text-sm">Civil Engineering Student</p>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // --- KONFIGURASI GEMINI API DENGAN KEY KAMU ---
        const API_KEY = "AIzaSyDkogbUCP89fyAntOtiPnkF_oicYZNurhU"; 
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        // --- FUNGSI AI CHAT ---
        const chatMessages = document.getElementById('chatMessages');
        const aiInput = document.getElementById('aiInput');
        const sendAiBtn = document.getElementById('sendAiBtn');

        async function getGeminiResponse(userMessage) {
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Kamu adalah asisten AI di website personal branding M. Rofi Ardiansyah (seorang mahasiswa Teknik Sipil UNMER Madiun, lulusan SMKN 1 Wonoasri). Jawab pertanyaan berikut dengan gaya santai, informatif, dan cerdas: ${userMessage}` }] }]
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                console.error(error);
                return "Aduh, ada masalah koneksi ke server Gemini. Coba lagi nanti!";
            }
        }

        async function handleSendMessage() {
            const message = aiInput.value.trim();
            if (!message) return;

            appendMessage(message, 'user');
            aiInput.value = '';
            const loadingId = addLoadingMessage();
            
            const botResponse = await getGeminiResponse(message);
            
            removeLoadingMessage(loadingId);
            appendMessage(botResponse, 'bot');
        }

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = sender === 'user' 
                ? "bg-green-600 text-black p-3 rounded-lg rounded-tr-none self-end max-w-[85%] font-medium"
                : "bg-green-900/30 border border-green-500/30 p-3 rounded-lg rounded-tl-none text-green-100 self-start max-w-[85%]";
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addLoadingMessage() {
            const id = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = id;
            loadingDiv.className = "text-green-500 text-xs italic animate-pulse p-2";
            loadingDiv.innerText = "Gemini sedang berpikir...";
            chatMessages.appendChild(loadingDiv);
            return id;
        }

        function removeLoadingMessage(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        sendAiBtn.addEventListener('click', handleSendMessage);
        aiInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSendMessage(); });

        // --- SISTEM AUTH & UI LAINNYA ---
        function hideOverlay() {
            if (localStorage.getItem('isAuthorized') === 'true') {
                const overlay = document.getElementById('passwordOverlay');
                if(overlay) overlay.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }
        window.addEventListener('pageshow', hideOverlay);
        window.addEventListener('DOMContentLoaded', hideOverlay);

        function checkPassword() {
            const input = document.getElementById('passInput');
            if (input.value === "rofibaik") {
                localStorage.setItem('isAuthorized', 'true');
                document.getElementById('authSection').classList.add('hidden');
                document.getElementById('successSection').classList.replace('hidden', 'flex');
            } else {
                input.classList.add('shake-animation', 'border-red-500');
                document.getElementById('errorText').classList.remove('opacity-0');
                setTimeout(() => input.classList.remove('shake-animation', 'border-red-500'), 300);
            }
        }

        function enterWebsite() {
            document.getElementById('passwordOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('passwordOverlay').style.display = 'none';
                document.body.style.overflow = 'auto'; 
            }, 700);
        }

        const aiToggleBtn = document.getElementById('aiToggleBtn');
        const aiChatBox = document.getElementById('aiChatBox');
        aiToggleBtn.addEventListener('click', () => {
            aiChatBox.classList.toggle('opacity-0');
            aiChatBox.classList.toggle('scale-95');
            aiChatBox.classList.toggle('pointer-events-none');
        });
        document.getElementById('closeAiBtn').addEventListener('click', () => {
            aiChatBox.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
        });

        AOS.init({ duration: 1000, once: false });

        const musicBtn = document.getElementById('musicBtn');
        const audio = document.getElementById('myAudio');
        let isPlaying = false;
        musicBtn.addEventListener('click', () => {
            if (isPlaying) { audio.pause(); musicBtn.classList.remove('music-playing'); }
            else { audio.play(); musicBtn.classList.add('music-playing'); }
            isPlaying = !isPlaying;
        });
    </script>
</body>
</html>
