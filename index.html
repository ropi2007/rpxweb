<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M. Rofi Ardiansyah | Personal Branding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #000000;
            background-image: 
                linear-gradient(rgba(0, 255, 102, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 102, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #e2e8f0;
        }
        .glass {
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 102, 0.25);
        }
        .text-glow { text-shadow: 0 0 15px rgba(0, 255, 102, 0.8); }
        .neon-border { box-shadow: 0 0 15px rgba(0, 255, 102, 0.4); }
    </style>
</head>
<body class="overflow-x-hidden">

    <section class="min-h-screen flex flex-col items-center justify-center relative px-6">
        <div data-aos="zoom-in" class="relative group mt-10">
            <div class="absolute -inset-1 bg-gradient-to-r from-green-400 to-emerald-600 rounded-full blur opacity-30"></div>
            <img src="118224.jpg" alt="Rofi" class="relative w-48 h-48 rounded-full object-cover border-4 border-green-500 shadow-2xl grayscale hover:grayscale-0 transition-all duration-700">
        </div>

        <div class="text-center mt-8">
            <h1 data-aos="fade-up" class="text-4xl md:text-6xl font-extrabold text-white">
                M. ROFI <span class="text-green-500 text-glow">ARDIANSYAH</span>
            </h1>
            <p data-aos="fade-up" data-aos-delay="200" class="text-green-400 mt-2 tracking-widest uppercase text-sm">
                Civil Engineering Student & Tech Enthusiast
            </p>
        </div>
    </section>

    <section class="py-20 px-6 max-w-4xl mx-auto">
        <h2 data-aos="fade-right" class="text-2xl font-bold mb-10 text-white flex items-center gap-4">
            <span class="w-12 h-[2px] bg-green-500"></span> BIODATA
        </h2>
        <div class="grid md:grid-cols-2 gap-8">
            <div class="glass p-8 rounded-2xl">
                <h3 class="text-green-400 font-bold mb-4">Pendidikan</h3>
                <p class="text-sm">S1 Teknik Sipil UNMER Madiun</p>
                <p class="text-xs text-gray-500">Alumni SMKN 1 Wonoasri (DPIB)</p>
            </div>
            <div class="glass p-8 rounded-2xl">
                <h3 class="text-green-400 font-bold mb-4">Pengalaman</h3>
                <p class="text-sm">Internship 6 Bulan - CV AA Contractor</p>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center text-green-800 text-[10px] tracking-widest uppercase">
        &copy; 2026 M. ROFI ARDIANSYAH.
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Inisialisasi AOS biar animasi geraknya jalan
        AOS.init({ duration: 1000, once: true });
    </script>
</body>
</html>
